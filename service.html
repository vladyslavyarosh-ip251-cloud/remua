<!doctype html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Деталі послуги - RemUa</title>
<link rel="stylesheet" href="style.css">
<style>
  .service-detail-container {
    max-width: 900px;
    margin: 30px auto;
    padding: 20px;
    border-radius: 12px;
    display: flex;
    gap: 30px;
  }
  .service-detail-img {
    width: 50%;
    border-radius: 8px;
    object-fit: cover;
  }
  .service-detail-info {
    width: 50%;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .service-detail-info h2 { font-size: 32px; margin-bottom: 10px; color: var(--text-color); }
  .service-detail-info .price { font-size: 28px; color: #e74c3c; font-weight: bold; margin-bottom: 20px; }
  .service-detail-info .desc { font-size: 18px; line-height: 1.6; margin-bottom: 30px; color: var(--text-color); }
  .buy-btn {
    background: #27ae60;
    color: white;
    border: none;
    padding: 15px;
    font-size: 18px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
  }
  .buy-btn:hover { background: #2ecc71; }
  
  @media (max-width: 768px) {
    .service-detail-container { flex-direction: column; }
    .service-detail-img, .service-detail-info { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div>
    <a href="index.html" style="text-decoration:none;color:inherit;">
      <h1>RemUa</h1>
    </a>
    <div class="nav-links" style="margin-top: 10px;">
      <a href="index.html" style="color: white; text-decoration: none; margin-right: 15px; font-weight: bold;">🏠 Головна</a>
      <a href="contacts.html" style="color: white; text-decoration: none; margin-right: 15px; font-weight: bold;">📞 Контакти</a>
    </div>
  </div>

  <div class="user-info">
    <button id="themeBtn" class="theme-toggle-btn" onclick="toggleTheme()">🌙</button>
    <span id="welcomeText" style="margin-right:15px;">Завантаження...</span>
    <button class="logout-btn" onclick="logout()">Вийти</button>
  </div>
</header>

<main>
  <div class="panel service-detail-container" id="detailContent">
    <h2>Завантаження даних...</h2>
  </div>
</main>

<script type="module">
  import { supabase } from "./auth.js"; // Імпортуємо твій Supabase клієнт

  async function loadService() {
    // 1. Отримуємо ID з URL (наприклад: service.html?id=5)
    const urlParams = new URLSearchParams(window.location.search);
    const serviceId = urlParams.get("id");

    if (!serviceId) {
      document.getElementById("detailContent").innerHTML = "<h2>Помилка: Послугу не знайдено!</h2>";
      return;
    }

    // 2. Робимо запит в Supabase
    const { data, error } = await supabase
      .from("services")
      .select("*")
      .eq("id", serviceId)
      .single(); // Отримуємо лише 1 запис

    if (error || !data) {
      document.getElementById("detailContent").innerHTML = "<h2>Послугу не знайдено або видалено.</h2>";
      return;
    }

    // 3. Відмальовуємо дані на сторінці
    document.getElementById("detailContent").innerHTML = `
      <img src="${data.image}" class="service-detail-img" onerror="this.src='https://placehold.co/600x400'">
      <div class="service-detail-info">
        <h2>${data.name}</h2>
        <p class="price">${data.price} грн</p>
        <p class="desc">${data.description ? data.description : "Опис для цієї послуги ще не додано."}</p>
        
        <button class="buy-btn" onclick="addToCartSingle(${data.id}, '${data.name}', ${data.price}, '${data.image}')">
          🛒 Додати в кошик
        </button>
      </div>
    `;
  }

  // Запускаємо при завантаженні сторінки
  window.addEventListener("DOMContentLoaded", loadService);
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  initTheme();
  const name = localStorage.getItem("userName");
  if (!name) {
    window.location.href = "auth.html";
    return;
  }
  document.getElementById("welcomeText").textContent = "Вітаємо, " + name + "!";
});

// Додавання в кошик прямо зі сторінки товару
function addToCartSingle(id, name, price, image) {
  let myOrders = JSON.parse(localStorage.getItem("myOrders")) || [];
  myOrders.push({ id, name, price, image });
  localStorage.setItem("myOrders", JSON.stringify(myOrders));
  alert("Послугу успішно додано в кошик!");
}

function toggleTheme() {
  const isDark = document.body.classList.toggle("dark");
  localStorage.setItem("theme", isDark ? "dark" : "light");
  updateThemeButton(isDark);
}

function updateThemeButton(isDark) {
  const btn = document.getElementById("themeBtn");
  if (btn) btn.textContent = isDark ? "☀️" : "🌙";
}

function initTheme() {
  const savedTheme = localStorage.getItem("theme");
  const isDark = savedTheme === "dark";
  if (isDark) document.body.classList.add("dark");
  updateThemeButton(isDark);
}

function logout() {
  localStorage.clear();
  window.location.href = "auth.html";
}

window.toggleTheme = toggleTheme;
window.logout = logout;
window.addToCartSingle = addToCartSingle;
</script>

</body>
</html>
