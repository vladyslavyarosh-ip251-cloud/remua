<!doctype html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RemUa - Головна</title>
<link rel="stylesheet" href="style.css">

<style>
.cart-btn{
  background:#f39c12;
  color:white;
  border:none;
  padding:8px 15px;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
  margin-right:10px;
}
.cart-btn:hover{
  background:#e67e22;
}
</style>

</head>
<body>

<header>
  <a href="index.html" style="text-decoration:none;color:inherit;">
    <h1>RemUa</h1>
  </a>

  <div class="user-info">
    <span id="welcomeText" style="margin-right:15px;">
      Завантаження...
    </span>

    <button class="cart-btn"
      onclick="window.location.href='cart.html'">
      🛒 Кошик (<span id="cartCount">0</span>)
    </button>

    <button class="logout-btn" onclick="logout()">
      Вийти
    </button>
  </div>
</header>

<main>

  <!-- ADMIN -->
  <div class="panel admin-controls"
       id="adminPanel"
       style="display:none;">

    <h2>Управління каталогом</h2>

    <div class="admin-form">

      <input type="hidden" id="editId">

      <input
        type="text"
        id="adminName"
        placeholder="Назва послуги">

      <input
        type="number"
        id="adminPrice"
        placeholder="Ціна">

      <input
        type="text"
        id="adminImage"
        placeholder="URL картинки">

      <button id="adminSaveBtn"
        onclick="saveService()">
        Додати послугу
      </button>

      <button
        id="adminCancelBtn"
        onclick="cancelEdit()"
        style="display:none;background:#6c757d;">
        Скасувати
      </button>

    </div>

    <table class="admin-table">
      <thead>
        <tr>
          <th>Назва</th>
          <th>Ціна</th>
          <th>Дії</th>
        </tr>
      </thead>

      <tbody id="adminTableBody"></tbody>
    </table>

  </div>

  <!-- USER -->
  <div class="panel" id="userPanel" style="display:none;">

    <h2>Каталог послуг</h2>

    <div class="catalog-controls">

      <input
        type="text"
        id="searchInput"
        placeholder="Пошук..."
        oninput="handleControlsChange()">

      <select
        id="sortSelect"
        onchange="handleControlsChange()">

        <option value="default">
          За замовчуванням
        </option>

        <option value="price-asc">
          Найдешевші
        </option>

        <option value="price-desc">
          Найдорожчі
        </option>

        <option value="name-asc">
          За алфавітом
        </option>

      </select>

    </div>

    <div class="catalog-grid" id="catalogList"></div>

    <div class="pagination"
         id="paginationControls"></div>

  </div>

</main>

<!-- MODULE -->
<script type="module" src="script.js"></script>

<!-- PAGE LOGIC -->
<script>
document.addEventListener("DOMContentLoaded", () => {

  const role = localStorage.getItem("userRole");
  const name = localStorage.getItem("userName");

  if (!name) {
    window.location.href = "auth.html";
    return;
  }

  document.getElementById("welcomeText").textContent =
    "Вітаємо, " + name + "!";

  if (role === "admin") {
    document.getElementById("adminPanel").style.display = "block";
  }

  document.getElementById("userPanel").style.display = "block";

});

function logout() {
  localStorage.removeItem("userRole");
  localStorage.removeItem("userName");
  localStorage.removeItem("myOrders");

  window.location.href = "auth.html";
}
</script>

</body>
</html>
