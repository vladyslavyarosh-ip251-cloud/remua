<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RemUa - Кошик</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .back-btn {
        background-color: #3498db;
        color: white;
        border: none;
        padding: 8px 15px;
        cursor: pointer;
        border-radius: 5px;
        margin-right: 10px;
      }
      .back-btn:hover {
        background-color: #2980b9;
      }

      .cart-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .cart-list li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        border-bottom: 1px solid #ddd;
        background-color: #fff;
        margin-bottom: 5px;
        border-radius: 5px;
      }
      .remove-btn {
        background: none;
        color: red;
        cursor: pointer;
        border: none;
        font-size: 20px;
        font-weight: bold;
      }
      .remove-btn:hover {
        color: darkred;
      }
      .total-price {
        text-align: right;
        margin-top: 20px;
        font-size: 1.2em;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="index.html" style="text-decoration: none"
        ><h1>RemUa - Кошик</h1></a
      >
      <div class="user-info">
        <button class="back-btn" onclick="window.location.href = 'index.html'">
          ⬅ Назад у каталог
        </button>
        <button class="logout-btn" onclick="logout()">Вийти</button>
      </div>
    </header>

    <main>
      <div class="panel">
        <h2>Мої замовлення</h2>
        <ul id="myOrdersPage" class="cart-list"></ul>
        <div id="totalContainer" class="total-price"></div>
      </div>
    </main>

    <script src="cart.js"></script>
  </body>
</html>
